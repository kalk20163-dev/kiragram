name: kiragram
description: Kira Gram — A Flutter social messaging app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  firebase_database: ^11.0.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Networking
  http: ^1.2.1

  # Media
  image_picker: ^1.1.2
  record: 5.1.0
  audioplayers: ^5.2.1

  # Storage & Caching
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1
  path_provider: ^2.1.4

  # Utilities
  intl: ^0.19.0
  crypto: ^3.0.3
  permission_handler: ^11.3.1

  # UI
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Icons (default Flutter)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"
  min_sdk_android: 21

dependency_overrides:
  record_platform_interface: 1.1.0
  record_linux: 0.7.1

flutter:
  uses-material-design: true
